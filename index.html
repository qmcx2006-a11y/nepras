<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل قاعات الكلية التقنية</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-card">
        <div class="logo-container">
            <img src="logo.png.png" alt="شعار الكلية" class="logo">
        </div>

        <h1>دليل القاعات الذكي</h1>
        <p class="subtitle">الكلية التقنية التطبيقية للبنات بالرياض</p>
<div class="search-group">
            <input type="text" id="classInput" placeholder="ابحث بالرمز، التعريف أو اسم المعمل..">
            <button onclick="findClass()">بحث</button>
        </div>

  <div id="result" class="info-box" style="display: none;">
            <strong class="room-title" id="roomCode"></strong>
            <div class="data-item">
                <span class="data-label">تعريف الغرفة</span>
                <span class="data-value" id="roomDef"></span>
            </div>
            <div class="data-item">
                <span class="data-label">الموقع</span>
                <span class="data-value" id="roomLoc"></span>
            </div>
        </div>
    </div>
     <div class="team-box">
        <h3 class="team-title">فريق تنفيذ المشروع</h3>
        <div class="team-members">
            <div class="team-row">
                <span>فاطمة الصفيان</span>
                <span>العنود الدوسري</span>
            </div>
            <div class="team-row">
                <span>ريهام المطيري</span>
                <span>الجوري الحارثي</span>
            </div>
            <div class="supervisor">بإشراف أ/ نجود العلي</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
